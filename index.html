<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bütçe Takip</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        margin-top: 50px;
    }
    .container {
        background: white;
        padding: 20px;
        width: 350px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
        text-align: center;
    }
    input, button {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
    }
    button {
        background: #28a745;
        color: white;
        border: none;
        cursor: pointer;
    }
    button:hover {
        background: #218838;
    }
    ul {
        list-style: none;
        padding: 0;
    }
    li {
        background: #eee;
        padding: 5px;
        margin: 5px 0;
        display: flex;
        justify-content: space-between;
    }
    .total {
        font-weight: bold;
        margin-top: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Bütçe Takip</h2>
    <input type="text" id="desc" placeholder="Açıklama">
    <input type="number" id="amount" placeholder="Tutar (negatif = gider)">
    <button onclick="addTransaction()">Ekle</button>

    <ul id="list"></ul>

    <div class="total">
        Toplam Bakiye: <span id="balance">0</span> ₺
    </div>
</div>

<script>
    let balance = 1;

    function addTransaction() {
        const desc = document.getElementById("desc").value;
        const amount = parseFloat(document.getElementById("amount").value);

        if (!desc || isNaN(amount)) {
            alert("Lütfen geçerli değer girin.");
            return;
        }

        balance += amount;
        document.getElementById("balance").innerText = balance;

        const li = document.createElement("li");
        li.innerHTML = `${desc} <span>${amount} ₺</span>`;
        document.getElementById("list").appendChild(li);

        document.getElementById("desc").value = "";
        document.getElementById("amount").value = "";
    }
</script>

</body>
</html>
